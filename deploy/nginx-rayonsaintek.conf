# /etc/nginx/sites-available/rayonsaintek.com
# PMII Rayon Saintek - Laravel + Livewire

server {
    listen 80;
    listen [::]:80;
    server_name rayonsaintek.com www.rayonsaintek.com;

    root /var/www/rayonsaintek/public;
    index index.php;

    charset utf-8;

    # Max upload (untuk foto kegiatan/karya)
    client_max_body_size 12M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Cache aset statis hasil build (Vite) + gambar
    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|ico|svg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/rayonsaintek.access.log;
    error_log  /var/log/nginx/rayonsaintek.error.log;
}
